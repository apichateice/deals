<html lang="th">
<head>

  <title>🛒 สินค้าแนะนำ Lazada ประจำวัน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --accent: #ff4444;
      --text: #f0f0f0;
      --sub: #a0a0b0;
      --border: #2a2a3e;
      --radius: 16px;
    }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .logo { font-size: 22px; font-weight: 800; color: var(--accent); }
    .updated { font-size: 12px; color: var(--sub); }

    /* ── Search ── */
    .search-bar {
      position: relative;
      margin-bottom: 12px;
    }
    .search-bar input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar .icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 18px; pointer-events: none;
    }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--sub);
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab:hover { border-color: #555; color: var(--text); }
    .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(255,68,68,.12); }
    .date-tabs { margin-top: 8px; }
    .tab.date-tab.active { border-color: #a29bfe; color: #a29bfe; background: rgba(162,155,254,.12); }

    /* ── Main content ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 20px 12px 40px; }

    /* ── Group section ── */
    .group { margin-bottom: 40px; }
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    .group-emoji { font-size: 28px; }
    .group-title { font-size: 20px; font-weight: 800; }
    .group-meta { margin-left: auto; font-size: 12px; color: var(--sub); text-align: right; }
    .group-keyword {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,.08);
      color: var(--sub);
    }

    /* ── Product grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    @media(min-width: 640px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; } }
    @media(min-width: 1024px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }

    /* ── Product card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.4);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #1e1e30;
      display: block;
    }
    .card-img.error {
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    .rank-badge {
      position: absolute;
      top: 8px; left: 8px;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .card-body {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text);
    }
    .card-price {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }
    .card-sold {
      font-size: 11px;
      color: var(--sub);
    }
    .card-btn {
      margin-top: auto;
      display: block;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .card-btn:hover { opacity: .85; }
    .card-btn.no-link {
      background: var(--border);
      color: var(--sub);
      cursor: default;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--sub);
      font-size: 16px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── No results ── */
    #no-results {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--sub);
    }
  </style>
</head>

const MODE_META = {"bestseller": {"emoji": "🔥", "label": "ขายดีอันดับต้น", "color": "#ff4444"}, "cheapest": {"emoji": "💸", "label": "ราคาถูกสุด", "color": "#00b894"}, "expensive": {"emoji": "✨", "label": "พรีเมียม", "color": "#fdcb6e"}, "toprated": {"emoji": "⭐", "label": "คะแนนดีสุด", "color": "#a29bfe"}, "newest": {"emoji": "🆕", "label": "มาใหม่ล่าสุด", "color": "#00cec9"}, "collectible": {"emoji": "🎖️", "label": "ของสะสมสุดเจ๋ง", "color": "#e17055"}, "limited": {"emoji": "🔖", "label": "ของลิมิเต็ด", "color": "#6c5ce7"}, "health": {"emoji": "💊", "label": "สุขภาพแนะนำ", "color": "#55efc4"}, "gadget": {"emoji": "🤖", "label": "แกดเจ็ตน่าซื้อ", "color": "#74b9ff"}, "beauty": {"emoji": "💄", "label": "ของแต่งหน้าขายดี", "color": "#fd79a8"}, "home": {"emoji": "🏠", "label": "ของแต่งบ้านสุดคุ้ม", "color": "#81ecec"}, "pet": {"emoji": "🐾", "label": "สัตว์เลี้ยงแนะนำ", "color": "#fab1a0"}, "kids": {"emoji": "🧸", "label": "ของเล่นเด็กยอดนิยม", "color": "#ffeaa7"}, "skincare": {"emoji": "🧴", "label": "สกินแคร์", "color": "#fd79a8"}, "food": {"emoji": "🍜", "label": "ของกินขายดี", "color": "#e17055"}, "sport": {"emoji": "🏋️", "label": "อุปกรณ์กีฬา", "color": "#00b894"}, "office": {"emoji": "💻", "label": "ทำงานที่บ้าน", "color": "#74b9ff"}, "fashion": {"emoji": "👗", "label": "แฟชั่น", "color": "#a29bfe"}, "custom": {"emoji": "🛒", "label": "สินค้าแนะนำ", "color": "#b2bec3"}};
let activeMode = 'all';
let activeDate = 'all';

// Build mode filter tabs
function buildTabs() {
  const tabs = document.getElementById('tabs');
  const modes = [...new Set(GROUPS.map(g => g.mode))];
  modes.forEach(mode => {
    const m = MODE_META[mode] || {};
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = (m.emoji || '') + ' ' + (m.label || mode);
    btn.onclick = () => filterMode(mode, btn);
    tabs.appendChild(btn);
  });
}

// Build date filter tabs
function buildDateTabs() {
  const tabs = document.getElementById('date-tabs');
  // Parse dd/MM/yyyy → sortable yyyyMMdd
  const parseDate = d => { const [dd,mm,yyyy] = d.split('/'); return yyyy+mm+dd; };
  const dates = [...new Set(GROUPS.map(g => g.date))]
    .sort((a,b) => parseDate(b).localeCompare(parseDate(a)));
  dates.forEach(date => {
    const btn = document.createElement('button');
    btn.className = 'tab date-tab';
    // show as "27 เม.ย." format
    const [dd,mm,yyyy] = date.split('/');
    const thMonths = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    btn.textContent = dd + ' ' + (thMonths[parseInt(mm)] || mm);
    btn.onclick = () => filterDate(date, btn);
    tabs.appendChild(btn);
  });
}

// Build product card HTML
function cardHTML(p, color) {
  const rankColor = color || '#ff4444';
  const imgSrc = p.image || '';
  const imgEl = imgSrc
    ? `<img class="card-img" src="${imgSrc}" alt="${p.name}" loading="lazy"
         onerror="this.outerHTML='<div class=\'card-img error\'>📦</div>'">`
    : `<div class="card-img error">📦</div>`;

  const btnEl = p.url
    ? `<a class="card-btn" href="${p.url}" target="_blank" rel="nofollow noopener">ดูสินค้า →</a>`
    : `<span class="card-btn no-link">ไม่มีลิ้งก์</span>`;

  return `
    <div class="card" data-name="${p.name.toLowerCase()}" data-mode="">
      ${imgEl}
      <div class="rank-badge" style="background:${rankColor}">#${p.rank}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price_str}</div>
        ${p.sold ? `<div class="card-sold">${p.sold}</div>` : ''}
        ${btnEl}
      </div>
    </div>`;
}

// Render all groups
function renderGroups(groups) {
  const main = document.getElementById('main');
  if (!groups.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div>ยังไม่มีสินค้า</div></div>`;
    return;
  }
  main.innerHTML = groups.map(g => {
    const m = MODE_META[g.mode] || {};
    const color = m.color || '#ff4444';
    const cards = g.products.map(p => cardHTML(p, color)).join('');
    return `
      <div class="group" data-mode="${g.mode}">
        <div class="group-header">
          <span class="group-emoji">${m.emoji || '🛒'}</span>
          <div>
            <div class="group-title">${g.title}</div>
            <span class="group-keyword">${g.keyword || g.mode}</span>
          </div>
          <div class="group-meta">
            ${g.date}<br>
            <span style="color:${color}">${m.label || g.mode}</span>
          </div>
        </div>
        <div class="grid">${cards}</div>
      </div>`;
  }).join('');
}

function filterMode(mode, el) {
  activeMode = mode;
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  filterAll();
}

function filterDate(date, el) {
  activeDate = date;
  document.querySelectorAll('#date-tabs .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  filterAll();
}

function filterAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const groups = GROUPS.filter(g =>
    (activeMode === 'all' || g.mode === activeMode) &&
    (activeDate === 'all' || g.date === activeDate)
  );

  let filteredGroups;
  if (!q) {
    filteredGroups = groups;
  } else {
    filteredGroups = groups.map(g => ({
      ...g,
      products: g.products.filter(p =>
        p.name.toLowerCase().includes(q) ||
        g.title.toLowerCase().includes(q) ||
        (g.keyword || '').toLowerCase().includes(q)
      )
    })).filter(g => g.products.length > 0);
  }

  if (activeDate === 'all') {
    filteredGroups = [...filteredGroups].sort((a, b) => {
      const parse = d => { const [dd,mm,yy] = d.split('/'); return new Date(yy,mm-1,dd); };
      return parse(b.date) - parse(a.date);
    });
  }

  renderGroups(filteredGroups);
  document.getElementById('no-results').style.display =
    filteredGroups.length === 0 && q ? 'block' : 'none';
}

// Init
buildTabs();
buildDateTabs();
filterAll();
</script>
</body>
